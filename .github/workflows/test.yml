name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test harness
        run: python -m tests.test_analyze
      - name: Run file-extraction tests
        run: python -m tests.test_file_extract
      - name: Run x402 middleware tests
        run: python -m tests.test_x402_middleware
